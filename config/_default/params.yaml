hugoblox:
  schema: "2.0"

  identity:
    name: "Lu Jinzhe (Jenkin)"
    organization: ""
    type: person
    tagline: "Remote Sensing & GIS Researcher"
    description: "Academic portfolio of Lu Jinzhe. Coastal Zone Environmental Monitoring, Google Earth Engine, and Lagoon Turbidity Analysis."
    social:
      github: "Pioneer-ex"

  theme:
    mode: system
    pack: "default"
    colors:
      primary: "teal"
      secondary: "cyan"
      neutral: "slate"

  typography:
    pack: "academic"

  layout:
    radius: "md"
    spacing: "spacious"
    avatar_shape: circle

  header:
    enable: true
    style: navbar
    sticky: true
    align: center
    search: true
    theme_toggle: true
    theme_picker: false
    language_switcher: false
    cta:
      enable: false
      text: ""
      url: ""

  footer:
    enable: true
    align: center
    copyright:
      enable: true
      text: "Copyright &copy; {{YEAR}} Lu Jinzhe. Powered by Hugo Blox."
    social:
      enable: true
      icons:
        - icon: fab fa-github
          url: "https://github.com/Pioneer-ex"
          label: GitHub
          target: _blank

  features:
    syntaxHighlighter:
      enable: true
      theme_light: github-light
      theme_dark: dracula
    privacyPack:
      enable: true
    search:
      provider: ""
    navigation:
      highlight_active_link: true
    sidebar:
      enable: true
      avatar:
        enable: true
        align: start
        size: medium
        shape: circle
