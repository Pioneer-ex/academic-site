# Hugo Configuration
# Docs: https://gohugo.io/getting-started/configuration/

title: "Lu Jinzhe | Remote Sensing & GIS Researcher"
baseURL: "https://pioneer-ex.github.io/academic-site/"
languageCode: en-us

defaultContentLanguage: en
hasCJKLanguage: false
removePathAccents: true

cascade:
  - target:
      path: /slides/**
      kind: page
    outputs: [HTML, present]

build:
  writeStats: true
enableGitInfo: true
summaryLength: 30
pagination:
  pagerSize: 10
enableEmoji: true
enableRobotsTXT: true
ignoreFiles: [".ipynb_checkpoints$", "\\.Rmd$", "\\.Rmarkdown$", "_cache$"]
disableAliases: true
outputs:
  home: [HTML, RSS, headers, redirects, backlinks]
  section: [HTML, RSS]
imaging:
  resampleFilter: lanczos
  quality: 90
  anchor: smart
  hint: picture
timeout: 600000
taxonomies:
  author: authors
  tag: tags
  publication_type: publication_types
markup:
  _merge: deep
  highlight:
    lineNos: false
security:
  _merge: deep
sitemap:
  _merge: deep
